version: '3.8'

services:
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./test.db
      - SECRET_KEY=your-super-secret-key
      - BACKEND_CORS_ORIGINS=["http://localhost:5173"]
    volumes:
      - ./server:/app

# Add a database service like PostgreSQL if not using SQLite
